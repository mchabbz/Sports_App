{% extends "base.html" %}

{% block content %}

<section class="page-header">
    <h2>Login</h2>
    <p>Log in to create, edit, and delete player records.</p>
</section>

{% if errors %}
<section class="error-box">
    <ul>
        {% for error in errors %}
            <li>{{ error }}</li>
        {% endfor %}
    </ul>
</section>
{% endif %}

<form class="data-form" method="POST" action="{{ url_for('auth.login') }}">

    <label>Email</label>
    <input type="email" name="email" value="{{ form_data.get('email', '') }}">

    <label>Password</label>
    <input type="password" name="password">

    <div class="form-actions">
        <button type="submit">Login</button>
        <a href="{{ url_for('auth.register') }}">Create an account</a>
    </div>

</form>

{% endblock %}
